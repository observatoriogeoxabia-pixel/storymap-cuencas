<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Cuenca de Barranqueres</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    html, body { margin: 0; height: 100%; }
    #map { width: 100%; height: 100%; }
  </style>
</head>
<body>
<div id="map"></div>
<script>
  const map = L.map('map', { zoomControl: false, attributionControl: false });

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 18 }).addTo(map);

  fetch('../cuencas/rios.geojson')
    .then(r => r.json())
    .then(g => L.geoJSON(g, { style:{ color:'#0077b6', weight:2 }}).addTo(map));

  fetch('../cuencas/barranqueres.geojson')
    .then(r => r.json())
    .then(g => {
      const l = L.geoJSON(g, {
        style:{ color:'#1d3557', weight:3, fillColor:'#457b9d', fillOpacity:0.4 }
      }).addTo(map);
      map.fitBounds(l.getBounds(), { padding:[20,20] });
    });
</script>
</body>
</html>
