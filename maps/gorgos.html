<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Cuenca</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js">
  </script>

  <style>
    html, body { margin: 0; height: 100%; }
    #map { width: 100%; height: 100%; }
  </style>
</head>

<body>
  <div id="map"></div>

  <script>
    const map = L.map('map', {
      zoomControl: false,
      attributionControl: false
    });

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 18
    }).addTo(map);

    // 🔵 Capa de ríos (primero)
    fetch('../cuencas/rios.geojson')
      .then(r => r.json())
      .then(geojson => {
        L.geoJSON(geojson, {
          style: {
            color: '#0077b6',
            weight: 2
          }
        }).addTo(map);
      });

    // 🟦 Capa de la cuenca (después)
    fetch('../cuencas/gorgos.geojson')
      .then(r => r.json())
      .then(geojson => {
        const layer = L.geoJSON(geojson, {
          style: {
            color: '#1d3557',
            weight: 3,
            fillColor: '#457b9d',
            fillOpacity: 0.4
          }
        }).addTo(map);

        map.fitBounds(layer.getBounds(), {
          padding: [20, 20]
        });
      });
  </script>
</body>
</html>
